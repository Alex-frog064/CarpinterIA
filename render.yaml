services:
  - type: web
    name: carpinteria
    runtime: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3:latest
      - key: DB_PATH
        value: /data/carpinteria.db
    healthCheckPath: /health
    autoDeploy: true

disks:
  - name: carpinteria-data
    mountPath: /data
    sizeGB: 1
