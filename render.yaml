services:
  - type: web
    name: carpinteria
    runtime: docker
    dockerfilePath: Dockerfile
    envVars:
      - key: OLLAMA_BASE_URL
        sync: false
      - key: OLLAMA_MODEL
        value: llama3:latest
      - key: DB_PATH
        value: /app/carpinteria.db
      - key: REPORT_PATH
        value: /app/reporte_evaluacion.pdf
    healthCheckPath: /health
    autoDeploy: true
